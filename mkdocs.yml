site_name: DataverseNO
site_url: https://info.dataverse.no
site_description: Documentation and information about the DataverseNO research data repository
repo_url: https://github.com/lversen/Info-Dataverse
repo_name: Info-Dataverse

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.breadcrumbs
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - toc.follow
    - content.tooltips
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - en
  - git-revision-date-localized:
      enable_creation_date: false
      type: date

nav:
  - Home: index.md
  - About DataverseNO:
    - about/index.md
    - What is DataverseNO?: about/what-is-dataverseno.md
    - Who can use DataverseNO?: about/who-can-use.md
    - Why use DataverseNO?: about/why-use.md
  - Deposit guidelines:
    - deposit/index.md
    - Prepare your data: deposit/prepare.md
    - Deposit and publish: deposit/deposit-and-publish.md
    - Refer to your data: deposit/refer.md
  - Curation guidelines:
    - curation/index.md
    - Curation of datasets:
      - Metadata: curation/datasets/metadata.md
      - Files: curation/datasets/files.md
      - Terms: curation/datasets/terms.md
      - Return to author: curation/datasets/return-to-author.md
      - Publish dataset: curation/datasets/publish.md
    - Other curation tasks: curation/other-tasks.md
  - Collection management: collection-management.md
  - Repository management: repository-management.md
  - News:
    - news/index.md
    - New website launched: news/first-post.md
  - Contact: contact.md
